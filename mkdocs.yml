site_name: YYN Wiki
site_description: yyn 的 Python 算法知识库
site_url: https://23ypz.github.io/yyn-wiki/
repo_url: https://github.com/23ypz/yyn-wiki
repo_name: 23ypz/yyn-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search:
      separator: '[\s\u200b\-]'

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - assets/javascripts/carousel.js
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/stylesheets/extra.css

# 顶部导航采用“大类”结构；左侧导航只显示当前大类下的小类页面。
nav:
  - 首页: index.md
  - 总览: algorithm-templates/index.md
  - 基础:
      - 二分: algorithm-templates/binary-search.md
      - 排序: algorithm-templates/sorting.md
      - 位运算: algorithm-templates/bitwise.md
  - 前缀与差分:
      - 前缀和与差分总览: algorithm-templates/prefix-difference.md
      - 前缀和:
          - 一维前缀和: algorithm-templates/prefix-sum-1d.md
          - 二维前缀和: algorithm-templates/prefix-sum-2d.md
      - 差分:
          - 一维差分: algorithm-templates/difference-1d.md
          - 二维差分: algorithm-templates/difference-2d.md
  - 数据结构:
      - 数据结构总览: algorithm-templates/data-structures.md
      - 并查集:
          - 普通并查集: algorithm-templates/dsu-basic.md
          - 带权并查集: algorithm-templates/dsu-weighted.md
      - 堆:
          - 对顶堆: algorithm-templates/two-heaps.md
          - 懒删除堆: algorithm-templates/lazy-heap.md
      - 单调数据结构:
          - 单调栈: algorithm-templates/monotonic-stack.md
          - 单调队列: algorithm-templates/monotonic-queue.md
      - 有序列表:
          - SortedList: algorithm-templates/sorted-list.md
      - 树形数据结构:
          - 树状数组: algorithm-templates/fenwick-tree.md
          - 区间修改区间求和树状数组: algorithm-templates/fenwick-range.md
          - 线段树: algorithm-templates/segment-tree.md
          - Lazy 线段树: algorithm-templates/lazy-segment-tree.md
          - ST 表: algorithm-templates/sparse-table.md
  - 图论与树:
      - 图论与树总览: algorithm-templates/graph-tree.md
      - 广度优先搜索 BFS:
          - 网格 BFS: algorithm-templates/grid-bfs.md
          - 无权图最短路: algorithm-templates/unweighted-shortest-path.md
      - 深度优先搜索 DFS:
          - 连通块大小: algorithm-templates/connected-components.md
          - 二分图染色: algorithm-templates/bipartite-coloring.md
          - 图上 DFS: algorithm-templates/graph-dfs.md
      - 最短路:
          - Dijkstra 算法: algorithm-templates/dijkstra.md
          - Floyd 算法: algorithm-templates/floyd.md
          - 可加边 Dijkstra: algorithm-templates/add-edge-dijkstra.md
          - 可加边 Floyd: algorithm-templates/add-edge-floyd.md
      - 树上问题:
          - LCA 倍增: algorithm-templates/lca-binary-lifting.md
          - 带权树 LCA: algorithm-templates/weighted-lca.md
          - 树上差分: algorithm-templates/tree-difference.md
  - 动态规划:
      - 动态规划总览: algorithm-templates/dynamic-programming.md
      - 简单 DP: algorithm-templates/simple-dp.md
      - 背包 DP: algorithm-templates/knapsack-dp.md
      - 区间 DP: algorithm-templates/interval-dp.md
      - 树形 DP: algorithm-templates/tree-dp.md
      - 数位 DP: algorithm-templates/digit-dp.md
  - 数学:
      - 数学总览: algorithm-templates/number-theory.md
      - 快速幂: algorithm-templates/fast-power.md
      - 最大公约数: algorithm-templates/gcd.md
      - 最小公倍数: algorithm-templates/lcm.md
      - 矩阵快速幂: algorithm-templates/matrix-fast-power.md
      - 组合数: algorithm-templates/combination.md
      - 质因数分解: algorithm-templates/prime-factorization.md
      - 质数筛: algorithm-templates/prime-sieve.md
      - 逆元: algorithm-templates/modular-inverse.md
  - 字符串:
      - 字符串基础: algorithm-templates/string-basics.md
  - 标签: tags.md
