<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560"><style>
text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #243447; }
.title { font-size: 28px; font-weight: 700; }
.subtitle { font-size: 19px; fill: #5b6b7a; }
.normal { font-size: 20px; }
.small { font-size: 15px; }
.tiny { font-size: 13px; fill: #5b6b7a; }
.muted { fill: #5b6b7a; }
.cell { fill:#eef3ff; stroke:#4c6fff; stroke-width:2; }
.hot { fill:#fff3cd; stroke:#e0ad00; stroke-width:2.2; }
.good { fill:#d7fbe8; stroke:#2ea44f; stroke-width:2.2; }
.bad { fill:#ffe6e6; stroke:#d64242; stroke-width:2.2; }
.gray { fill:#f4f5f7; stroke:#c7ccd1; stroke-width:1.5; }
.white { fill:#fff; stroke:#c7ccd1; stroke-width:1.5; }
.edge { stroke:#768399; stroke-width:2.4; }
.arrow { stroke:#3757d6; stroke-width:3; fill:none; marker-end:url(#arrow); }
.arrow2 { stroke:#d64242; stroke-width:3; fill:none; marker-end:url(#arrow2); }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#3757d6"/></marker>
  <marker id="arrow2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d64242"/></marker>
</defs><rect width="100%" height="100%" fill="#ffffff"/><text x="44" y="48" class="title">KMP 匹配过程 · 步骤 1</text><text x="44" y="82" class="subtitle">先对模式串 t 计算 nxt 数组，也就是每个前缀的最长相等真前后缀。</text><text x="100" y="128" class="normal">模式串 t</text><rect x="100" y="150" width="58" height="58" rx="10" class="good"/><text x="129.0" y="187" text-anchor="middle" class="normal">a</text><text x="129.0" y="232" text-anchor="middle" class="tiny">0</text><rect x="166" y="150" width="58" height="58" rx="10" class="hot"/><text x="195.0" y="187" text-anchor="middle" class="normal">b</text><text x="195.0" y="232" text-anchor="middle" class="tiny">1</text><rect x="232" y="150" width="58" height="58" rx="10" class="hot"/><text x="261.0" y="187" text-anchor="middle" class="normal">a</text><text x="261.0" y="232" text-anchor="middle" class="tiny">2</text><rect x="298" y="150" width="58" height="58" rx="10" class="good"/><text x="327.0" y="187" text-anchor="middle" class="normal">b</text><text x="327.0" y="232" text-anchor="middle" class="tiny">3</text><rect x="364" y="150" width="58" height="58" rx="10" class="cell"/><text x="393.0" y="187" text-anchor="middle" class="normal">d</text><text x="393.0" y="232" text-anchor="middle" class="tiny">4</text><rect x="520" y="145" width="500" height="210" rx="14" class="gray"/><text x="555" y="205" class="normal">nxt[i] = t[:i] 的最长相等真前后缀长度</text><text x="555" y="255" class="normal">t = ababd</text><text x="555" y="305" class="normal">nxt = [0,0,0,1,2,0]</text><rect x="70" y="470" width="960" height="58" rx="14" class="gray"/><text x="105" y="506" class="normal muted">• nxt 只和模式串有关，预处理一次后可以用于整个匹配过程。</text></svg>