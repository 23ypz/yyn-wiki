</defs><rect width="100%" height="100%" fill="#ffffff"/><text x="44" y="48" class="title">字符串哈希 · 步骤 3</text><text x="44" y="82" class="subtitle">子串 [l,r] 的哈希等于右前缀减去左前缀乘上对应幂。</text><text x="90" y="128" class="normal">字符串 s</text><rect x="90" y="150" width="58" height="58" rx="10" class="cell"/><text x="119.0" y="187" text-anchor="middle" class="normal">a</text><text x="119.0" y="232" text-anchor="middle" class="tiny">0</text><rect x="156" y="150" width="58" height="58" rx="10" class="hot"/><text x="185.0" y="187" text-anchor="middle" class="normal">a</text><text x="185.0" y="232" text-anchor="middle" class="tiny">1</text><rect x="222" y="150" width="58" height="58" rx="10" class="hot"/><text x="251.0" y="187" text-anchor="middle" class="normal">b</text><text x="251.0" y="232" text-anchor="middle" class="tiny">2</text><rect x="288" y="150" width="58" height="58" rx="10" class="hot"/><text x="317.0" y="187" text-anchor="middle" class="normal">a</text><text x="317.0" y="232" text-anchor="middle" class="tiny">3</text><rect x="354" y="150" width="58" height="58" rx="10" class="cell"/><text x="383.0" y="187" text-anchor="middle" class="normal">b</text><text x="383.0" y="232" text-anchor="middle" class="tiny">4</text><rect x="420" y="150" width="58" height="58" rx="10" class="cell"/><text x="449.0" y="187" text-anchor="middle" class="normal">a</text><text x="449.0" y="232" text-anchor="middle" class="tiny">5</text><rect x="90" y="300" width="600" height="62" rx="12" class="gray"/><text x="125" y="340" class="normal">hash(l,r)=h[r]-h[l-1]*p[r-l+1]</text><rect x="745" y="150" width="300" height="210" rx="14" class="gray"/><text x="780" y="220" class="normal">减掉左侧多余前缀</text><text x="780" y="280" class="normal">再用 p 对齐位数</text><rect x="70" y="470" width="960" height="58" rx="14" class="gray"/><text x="105" y="506" class="normal muted">• 公式本质上是在 P 进制数中截取一段。</text></svg>