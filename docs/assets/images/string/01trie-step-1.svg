</defs><rect width="100%" height="100%" fill="#ffffff"/><text x="44" y="48" class="title">01 Trie 最大异或 · 步骤 1</text><text x="44" y="82" class="subtitle">01 Trie 把整数按二进制位从高到低插入。</text><text x="120" y="138" class="normal">查询数 x 的二进制</text><rect x="120" y="160" width="58" height="58" rx="10" class="hot"/><text x="149.0" y="197" text-anchor="middle" class="normal">1</text><text x="149.0" y="242" text-anchor="middle" class="tiny">0</text><rect x="186" y="160" width="58" height="58" rx="10" class="cell"/><text x="215.0" y="197" text-anchor="middle" class="normal">1</text><text x="215.0" y="242" text-anchor="middle" class="tiny">1</text><rect x="252" y="160" width="58" height="58" rx="10" class="cell"/><text x="281.0" y="197" text-anchor="middle" class="normal">0</text><text x="281.0" y="242" text-anchor="middle" class="tiny">2</text><rect x="318" y="160" width="58" height="58" rx="10" class="cell"/><text x="347.0" y="197" text-anchor="middle" class="normal">0</text><text x="347.0" y="242" text-anchor="middle" class="tiny">3</text><rect x="384" y="160" width="58" height="58" rx="10" class="cell"/><text x="413.0" y="197" text-anchor="middle" class="normal">1</text><text x="413.0" y="242" text-anchor="middle" class="tiny">4</text><rect x="110" y="300" width="430" height="80" rx="14" class="gray"/><text x="145" y="350" class="normal">每一位尽量让 x_bit xor y_bit = 1</text><rect x="650" y="135" width="330" height="250" rx="14" class="gray"/><text x="700" y="220" class="normal">从最高位开始</text><text x="700" y="280" class="normal">保证高位尽量大</text><rect x="70" y="470" width="960" height="58" rx="14" class="gray"/><text x="105" y="506" class="normal muted">• 最大异或问题贪心地从高位开始，因为高位的 1 比所有低位都更重要。</text></svg>