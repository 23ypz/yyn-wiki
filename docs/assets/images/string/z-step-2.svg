<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560"><style>
text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #243447; }
.title { font-size: 28px; font-weight: 700; }
.subtitle { font-size: 19px; fill: #5b6b7a; }
.normal { font-size: 20px; }
.small { font-size: 15px; }
.tiny { font-size: 13px; fill: #5b6b7a; }
.muted { fill: #5b6b7a; }
.cell { fill:#eef3ff; stroke:#4c6fff; stroke-width:2; }
.hot { fill:#fff3cd; stroke:#e0ad00; stroke-width:2.2; }
.good { fill:#d7fbe8; stroke:#2ea44f; stroke-width:2.2; }
.bad { fill:#ffe6e6; stroke:#d64242; stroke-width:2.2; }
.gray { fill:#f4f5f7; stroke:#c7ccd1; stroke-width:1.5; }
.white { fill:#fff; stroke:#c7ccd1; stroke-width:1.5; }
