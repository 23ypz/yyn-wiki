</defs><rect width="100%" height="100%" fill="#ffffff"/><text x="44" y="48" class="title">Z 函数计算过程 · 步骤 2</text><text x="44" y="82" class="subtitle">维护一个当前最右匹配段 [box_l, box_r]，它表示已经知道的一段前缀匹配。</text><text x="110" y="128" class="normal">字符串 s</text><rect x="110" y="150" width="58" height="58" rx="10" class="good"/><text x="139.0" y="187" text-anchor="middle" class="normal">b</text><text x="139.0" y="232" text-anchor="middle" class="tiny">0</text><rect x="176" y="150" width="58" height="58" rx="10" class="cell"/><text x="205.0" y="187" text-anchor="middle" class="normal">a</text><text x="205.0" y="232" text-anchor="middle" class="tiny">1</text><rect x="242" y="150" width="58" height="58" rx="10" class="hot"/><text x="271.0" y="187" text-anchor="middle" class="normal">b</text><text x="271.0" y="232" text-anchor="middle" class="tiny">2</text><rect x="308" y="150" width="58" height="58" rx="10" class="hot"/><text x="337.0" y="187" text-anchor="middle" class="normal">a</text><text x="337.0" y="232" text-anchor="middle" class="tiny">3</text><rect x="374" y="150" width="58" height="58" rx="10" class="hot"/><text x="403.0" y="187" text-anchor="middle" class="normal">b</text><text x="403.0" y="232" text-anchor="middle" class="tiny">4</text><text x="110" y="263" class="normal">后缀 s[i:] 对齐比较</text><rect x="110" y="285" width="58" height="58" rx="10" class="good"/><text x="139.0" y="322" text-anchor="middle" class="normal">b</text><text x="139.0" y="367" text-anchor="middle" class="tiny">0</text><rect x="176" y="285" width="58" height="58" rx="10" class="hot"/><text x="205.0" y="322" text-anchor="middle" class="normal">a</text><text x="205.0" y="367" text-anchor="middle" class="tiny">1</text><rect x="242" y="285" width="58" height="58" rx="10" class="hot"/><text x="271.0" y="322" text-anchor="middle" class="normal">b</text><text x="271.0" y="367" text-anchor="middle" class="tiny">2</text><rect x="308" y="285" width="58" height="58" rx="10" class="cell"/><text x="337.0" y="322" text-anchor="middle" class="normal">a</text><text x="337.0" y="367" text-anchor="middle" class="tiny">3</text><rect x="374" y="285" width="58" height="58" rx="10" class="cell"/><text x="403.0" y="322" text-anchor="middle" class="normal">b</text><text x="403.0" y="367" text-anchor="middle" class="tiny">4</text><rect x="520" y="150" width="500" height="210" rx="14" class="gray"/><text x="555" y="220" class="normal">当前盒子 [l,r] 表示 s[l..r] 与前缀相等</text><text x="555" y="275" class="normal">盒子越靠右，后面能复用的信息越多</text><rect x="70" y="470" width="960" height="58" rx="14" class="gray"/><text x="105" y="506" class="normal muted">• Z 算法和 KMP 一样，都是利用已经匹配过的信息减少重复比较。</text></svg>