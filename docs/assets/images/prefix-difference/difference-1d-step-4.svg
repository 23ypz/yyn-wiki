</defs><rect width="100%" height="100%" fill="#ffffff"/><text x="44" y="48" class="title">一维差分 · 步骤 4</text><text x="44" y="82" class="subtitle">最后对差分数组做一次前缀和，就能恢复修改后的原数组。</text><text x="92" y="140" class="normal">位置</text><rect x="92" y="180" width="92" height="62" rx="10" class="cell"/><text x="138.0" y="218" text-anchor="middle" class="normal">1</text><rect x="202" y="180" width="92" height="62" rx="10" class="good"/><text x="248.0" y="218" text-anchor="middle" class="normal">+v</text><rect x="312" y="180" width="92" height="62" rx="10" class="hot"/><text x="358.0" y="218" text-anchor="middle" class="normal">3</text><rect x="422" y="180" width="92" height="62" rx="10" class="hot"/><text x="468.0" y="218" text-anchor="middle" class="normal">4</text><rect x="532" y="180" width="92" height="62" rx="10" class="bad"/><text x="578.0" y="218" text-anchor="middle" class="normal">-v</text><rect x="642" y="180" width="92" height="62" rx="10" class="cell"/><text x="688.0" y="218" text-anchor="middle" class="normal">6</text><rect x="760" y="170" width="290" height="170" rx="14" class="gray"/><text x="790" y="225" class="normal">a[i]=d[1]+...+d[i]</text><text x="790" y="275" class="normal">做前缀和恢复数组</text><rect x="70" y="470" width="960" height="58" rx="14" class="gray"/><text x="105" y="506" class="normal muted">• 差分数组的前缀和就是修改后的真实数组。</text></svg>