<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560"><style>
text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #243447; }
.title { font-size: 28px; font-weight: 700; }
.subtitle { font-size: 19px; fill: #5b6b7a; }
