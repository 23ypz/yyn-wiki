<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
<style>
text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #243447; }
.small { font-size: 15px; }
.normal { font-size: 19px; }
.big { font-size: 26px; font-weight: 700; }
.muted { fill: #5b6b7a; }
.box { fill: #f8fbff; stroke: #4c6fff; stroke-width: 2.2; }
.hot { fill: #fff3cd; stroke: #e0ad00; stroke-width: 2.2; }
.done { fill: #d7fbe8; stroke: #2ea44f; stroke-width: 2.2; }
.bad { fill: #ffe6e6; stroke: #d64242; stroke-width: 2.2; }
.gray { fill: #f4f5f7; stroke: #c7ccd1; stroke-width: 1.5; }
.white { fill: #ffffff; stroke: #c7ccd1; stroke-width: 1.5; }
.edge { stroke: #768399; stroke-width: 2.2; }
.arrow { stroke: #3757d6; stroke-width: 3; fill: none; marker-end: url(#arrow); }
.arrow2 { stroke: #d64242; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
.grid { stroke: #cfd6e6; stroke-width: 2; }
.mono { font-family: Consolas, Menlo, monospace; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#3757d6"/></marker>
  <marker id="arrow2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d64242"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/><text x="40" y="52" class="big">基础二分过程 · 步骤 3</text><text x="40" y="88" class="normal muted">mid=5，a[5]=6 &gt;= 5，说明答案不在 mid 右侧，令 r=mid。</text><rect x="70" y="155" width="87" height="70" rx="10" class="bad"/><text x="113.5" y="197" text-anchor="middle" class="big">1</text><text x="113.5" y="250" text-anchor="middle" class="small muted">i=0</text><rect x="165" y="155" width="87" height="70" rx="10" class="bad"/><text x="208.5" y="197" text-anchor="middle" class="big">2</text><text x="208.5" y="250" text-anchor="middle" class="small muted">i=1</text><rect x="260" y="155" width="87" height="70" rx="10" class="bad"/><text x="303.5" y="197" text-anchor="middle" class="big">3</text><text x="303.5" y="250" text-anchor="middle" class="small muted">i=2</text><rect x="355" y="155" width="87" height="70" rx="10" class="bad"/><text x="398.5" y="197" text-anchor="middle" class="big">4</text><text x="398.5" y="250" text-anchor="middle" class="small muted">i=3</text><rect x="450" y="155" width="87" height="70" rx="10" class="white"/><text x="493.5" y="197" text-anchor="middle" class="big">5</text><text x="493.5" y="250" text-anchor="middle" class="small muted">i=4</text><rect x="545" y="155" width="87" height="70" rx="10" class="hot"/><text x="588.5" y="197" text-anchor="middle" class="big">6</text><text x="588.5" y="250" text-anchor="middle" class="small muted">i=5</text><rect x="640" y="155" width="87" height="70" rx="10" class="white"/><text x="683.5" y="197" text-anchor="middle" class="big">7</text><text x="683.5" y="250" text-anchor="middle" class="small muted">i=6</text><text x="398.5" y="133" text-anchor="middle" class="normal" fill="#d64242">l</text><line x1="398.5" y1="145" x2="398.5" y2="153" stroke="#d64242" stroke-width="3"/><text x="743" y="133" text-anchor="middle" class="normal" fill="#2ea44f">r</text><line x1="743" y1="145" x2="743" y2="153" stroke="#2ea44f" stroke-width="3"/><text x="588.5" y="133" text-anchor="middle" class="normal" fill="#e0ad00">mid</text><line x1="588.5" y1="145" x2="588.5" y2="153" stroke="#e0ad00" stroke-width="3"/><rect x="75" y="330" width="955" height="150" rx="16" class="gray"/><text x="110" y="372" class="normal muted">• 不变量：a[l] &lt; target，a[r] &gt;= target。</text><text x="110" y="408" class="normal muted">• 区间采用开区间 (l, r)，所以循环条件是 l + 1 &lt; r。</text><text x="110" y="444" class="normal muted">• 循环结束时 l 与 r 相邻，r 就是第一个满足条件的位置。</text></svg>