<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
<style>
text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #243447; }
.small { font-size: 15px; }
.normal { font-size: 19px; }
.big { font-size: 26px; font-weight: 700; }
.muted { fill: #5b6b7a; }
.box { fill: #f8fbff; stroke: #4c6fff; stroke-width: 2.2; }
.hot { fill: #fff3cd; stroke: #e0ad00; stroke-width: 2.2; }
.done { fill: #d7fbe8; stroke: #2ea44f; stroke-width: 2.2; }
.bad { fill: #ffe6e6; stroke: #d64242; stroke-width: 2.2; }
.gray { fill: #f4f5f7; stroke: #c7ccd1; stroke-width: 1.5; }
.white { fill: #ffffff; stroke: #c7ccd1; stroke-width: 1.5; }
.edge { stroke: #768399; stroke-width: 2.2; }
.arrow { stroke: #3757d6; stroke-width: 3; fill: none; marker-end: url(#arrow); }
.arrow2 { stroke: #d64242; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
.grid { stroke: #cfd6e6; stroke-width: 2; }
.mono { font-family: Consolas, Menlo, monospace; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#3757d6"/></marker>
  <marker id="arrow2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d64242"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/><text x="40" y="52" class="big">二分答案单调性 · 步骤 1</text><text x="40" y="88" class="normal muted">P(x): 距离至少为 x 时能否放下所有点</text><rect x="90" y="160" width="95" height="70" rx="10" class="done"/><text x="137.5" y="204" text-anchor="middle" class="big">T</text><text x="137.5" y="258" text-anchor="middle" class="small muted">x=1</text><rect x="195" y="160" width="95" height="70" rx="10" class="done"/><text x="242.5" y="204" text-anchor="middle" class="big">T</text><text x="242.5" y="258" text-anchor="middle" class="small muted">x=2</text><rect x="300" y="160" width="95" height="70" rx="10" class="done"/><text x="347.5" y="204" text-anchor="middle" class="big">T</text><text x="347.5" y="258" text-anchor="middle" class="small muted">x=3</text><rect x="405" y="160" width="95" height="70" rx="10" class="hot"/><text x="452.5" y="204" text-anchor="middle" class="big">T</text><text x="452.5" y="258" text-anchor="middle" class="small muted">x=4</text><rect x="510" y="160" width="95" height="70" rx="10" class="bad"/><text x="557.5" y="204" text-anchor="middle" class="big">F</text><text x="557.5" y="258" text-anchor="middle" class="small muted">x=5</text><rect x="615" y="160" width="95" height="70" rx="10" class="bad"/><text x="662.5" y="204" text-anchor="middle" class="big">F</text><text x="662.5" y="258" text-anchor="middle" class="small muted">x=6</text><rect x="720" y="160" width="95" height="70" rx="10" class="bad"/><text x="767.5" y="204" text-anchor="middle" class="big">F</text><text x="767.5" y="258" text-anchor="middle" class="small muted">x=7</text><rect x="825" y="160" width="95" height="70" rx="10" class="bad"/><text x="872.5" y="204" text-anchor="middle" class="big">F</text><text x="872.5" y="258" text-anchor="middle" class="small muted">x=8</text><text x="90" y="310" class="big">最大化最小值</text><text x="90" y="350" class="normal muted">找最后一个 True，答案是 l。</text><rect x="90" y="390" width="900" height="92" rx="14" class="gray"/><text x="125" y="428" class="normal muted">核心：不是二分数组值，而是二分“答案 x”，再用 check(x) 判断 x 在单调序列中的位置。</text><text x="125" y="462" class="normal muted">只要 check(x) 关于 x 单调，就可以用边界二分定位临界点。</text></svg>