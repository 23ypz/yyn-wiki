<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
<style>
text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #243447; }
.small { font-size: 15px; }
.normal { font-size: 19px; }
.big { font-size: 26px; font-weight: 700; }
.muted { fill: #5b6b7a; }
.box { fill: #f8fbff; stroke: #4c6fff; stroke-width: 2.2; }
.hot { fill: #fff3cd; stroke: #e0ad00; stroke-width: 2.2; }
.done { fill: #d7fbe8; stroke: #2ea44f; stroke-width: 2.2; }
.bad { fill: #ffe6e6; stroke: #d64242; stroke-width: 2.2; }
.gray { fill: #f4f5f7; stroke: #c7ccd1; stroke-width: 1.5; }
.white { fill: #ffffff; stroke: #c7ccd1; stroke-width: 1.5; }
.edge { stroke: #768399; stroke-width: 2.2; }
.arrow { stroke: #3757d6; stroke-width: 3; fill: none; marker-end: url(#arrow); }
.arrow2 { stroke: #d64242; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
.grid { stroke: #cfd6e6; stroke-width: 2; }
.mono { font-family: Consolas, Menlo, monospace; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#3757d6"/></marker>
  <marker id="arrow2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d64242"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/><text x="40" y="52" class="big">排序 key 的含义 · 步骤 1</text><text x="40" y="88" class="normal muted">默认按元组字典序：先比第一维，再比第二维。</text><rect x="80" y="165" width="161" height="78" rx="12" class="box"/><text x="160.5" y="211" text-anchor="middle" class="big mono">(1, 2)</text><text x="160.5" y="271" text-anchor="middle" class="small muted">位置 0</text><rect x="255" y="165" width="161" height="78" rx="12" class="box"/><text x="335.5" y="211" text-anchor="middle" class="big mono">(2, 3)</text><text x="335.5" y="271" text-anchor="middle" class="small muted">位置 1</text><rect x="430" y="165" width="161" height="78" rx="12" class="box"/><text x="510.5" y="211" text-anchor="middle" class="big mono">(1, 7)</text><text x="510.5" y="271" text-anchor="middle" class="small muted">位置 2</text><rect x="605" y="165" width="161" height="78" rx="12" class="box"/><text x="685.5" y="211" text-anchor="middle" class="big mono">(2, 6)</text><text x="685.5" y="271" text-anchor="middle" class="small muted">位置 3</text><rect x="780" y="165" width="161" height="78" rx="12" class="box"/><text x="860.5" y="211" text-anchor="middle" class="big mono">(0, 3)</text><text x="860.5" y="271" text-anchor="middle" class="small muted">位置 4</text><rect x="80" y="340" width="930" height="118" rx="16" class="gray"/><text x="115" y="382" class="normal">当前规则：原始数据</text><text x="115" y="420" class="normal muted">Python 排序会先对每个元素计算 key，再按 key 的大小排序；元组 key 会按字典序逐项比较。</text></svg>