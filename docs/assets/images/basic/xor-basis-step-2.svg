<rect width="100%" height="100%" fill="#ffffff"/><text x="40" y="52" class="big">线性基过程 · 步骤 2</text><text x="40" y="88" class="normal muted">3 的二进制是 011，最高位为 1，b[1] 为空，所以放入 b[1]。</text><rect x="120" y="165" width="174" height="86" rx="12" class="white"/><text x="207.0" y="199" text-anchor="middle" class="normal muted">b[0]</text><text x="207.0" y="231" text-anchor="middle" class="big mono">0</text><rect x="310" y="165" width="174" height="86" rx="12" class="done"/><text x="397.0" y="199" text-anchor="middle" class="normal muted">b[1]</text><text x="397.0" y="231" text-anchor="middle" class="big mono">011</text><rect x="500" y="165" width="174" height="86" rx="12" class="done"/><text x="587.0" y="199" text-anchor="middle" class="normal muted">b[2]</text><text x="587.0" y="231" text-anchor="middle" class="big mono">101</text><rect x="690" y="165" width="174" height="86" rx="12" class="white"/><text x="777.0" y="199" text-anchor="middle" class="normal muted">b[3]</text><text x="777.0" y="231" text-anchor="middle" class="big mono">0</text><rect x="100" y="330" width="900" height="132" rx="16" class="gray"/><text x="135" y="370" class="normal muted">不变量：每个非零 b[i] 的最高位都是 i，并且不同基的最高位互不相同。</text><text x="135" y="408" class="normal muted">插入时不断用已有基消掉最高位；若最后变成 0，说明这个数不是新的独立信息。</text><text x="135" y="446" class="normal">当前结论：res=0</text></svg>