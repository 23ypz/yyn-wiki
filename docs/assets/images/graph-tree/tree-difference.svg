<svg xmlns="http://www.w3.org/2000/svg" width="900" height="370" viewBox="0 0 900 370">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3f51b5"/></marker></defs>
<style>
text{font-family:Arial,"Microsoft YaHei",sans-serif;font-size:16px;fill:#333}.small{font-size:13px;fill:#555}.title{font-size:20px;font-weight:700}.node{fill:#eef3ff;stroke:#3f51b5;stroke-width:2}.hot{fill:#fff3cd;stroke:#f0ad00;stroke-width:2}.done{fill:#e9f7ef;stroke:#2e7d32;stroke-width:2}.edge{stroke:#59636e;stroke-width:2}.arrow{stroke:#3f51b5;stroke-width:2;marker-end:url(#arrow)}.red{stroke:#d32f2f}.blue{stroke:#1976d2}.green{stroke:#2e7d32}
</style>

<text x="40" y="36" class="title">树上差分：路径贡献最后回收</text>
<circle cx="430" cy="70" r="28" class="done"/><text x="422" y="76">1</text>
<circle cx="280" cy="150" r="28" class="node"/><text x="272" y="156">2</text><circle cx="580" cy="150" r="28" class="node"/><text x="572" y="156">3</text>
<circle cx="200" cy="245" r="28" class="hot"/><text x="192" y="251">4</text><circle cx="360" cy="245" r="28" class="node"/><text x="352" y="251">5</text><circle cx="520" cy="245" r="28" class="node"/><text x="512" y="251">6</text><circle cx="660" cy="245" r="28" class="hot"/><text x="652" y="251">7</text>
<line x1="406" y1="84" x2="304" y2="136" class="edge"/><line x1="454" y1="84" x2="556" y2="136" class="edge"/>
<line x1="260" y1="170" x2="220" y2="222" class="edge"/><line x1="300" y1="170" x2="340" y2="222" class="edge"/><line x1="560" y1="170" x2="535" y2="222" class="edge"/><line x1="600" y1="170" x2="645" y2="222" class="edge"/>
<path d="M205 215 C270 120, 520 120, 655 215" fill="none" stroke="#d32f2f" stroke-width="3"/>
<text x="250" y="112" class="small">给路径 4 到 7 加 val，LCA 为 1</text>
<rect x="40" y="295" width="820" height="50" rx="12" fill="#f8f9fa" stroke="#ddd"/>
<text x="65" y="326" class="small">点权路径加：cnt[x]+=val, cnt[y]+=val, cnt[lca]-=val, cnt[parent[lca]]-=val，最后自底向上求和</text>

</svg>