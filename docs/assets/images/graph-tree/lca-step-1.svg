</defs><rect width="100%" height="100%" fill="#ffffff"/><text x="40" y="48" class="big">LCA 倍增查询过程 · 步骤 1</text><text x="40" y="82" class="normal muted">示例查询 LCA(8, 5)，先把整棵树的深度和祖先表预处理好。</text><line x1="500" y1="90" x2="300" y2="180" class="edge"/><line x1="500" y1="90" x2="700" y2="180" class="edge"/><line x1="300" y1="180" x2="220" y2="280" class="edge"/><line x1="300" y1="180" x2="380" y2="280" class="edge"/><line x1="700" y1="180" x2="620" y2="280" class="edge"/><line x1="700" y1="180" x2="780" y2="280" class="edge"/><line x1="220" y1="280" x2="220" y2="380" class="edge"/><circle cx="500" cy="90" r="28" fill="#eef3ff" stroke="#4c6fff" stroke-width="3"/><text x="500" y="98" text-anchor="middle" class="normal">1</text><circle cx="300" cy="180" r="28" fill="#eef3ff" stroke="#4c6fff" stroke-width="3"/><text x="300" y="188" text-anchor="middle" class="normal">2</text><circle cx="700" cy="180" r="28" fill="#eef3ff" stroke="#4c6fff" stroke-width="3"/><text x="700" y="188" text-anchor="middle" class="normal">3</text><circle cx="220" cy="280" r="28" fill="#eef3ff" stroke="#4c6fff" stroke-width="3"/><text x="220" y="288" text-anchor="middle" class="normal">4</text><circle cx="380" cy="280" r="28" fill="#eef3ff" stroke="#4c6fff" stroke-width="3"/><text x="380" y="288" text-anchor="middle" class="normal">5</text><circle cx="620" cy="280" r="28" fill="#eef3ff" stroke="#4c6fff" stroke-width="3"/><text x="620" y="288" text-anchor="middle" class="normal">6</text><circle cx="780" cy="280" r="28" fill="#eef3ff" stroke="#4c6fff" stroke-width="3"/><text x="780" y="288" text-anchor="middle" class="normal">7</text><circle cx="220" cy="380" r="28" fill="#fff3cd" stroke="#e0ad00" stroke-width="3"/><text x="220" y="388" text-anchor="middle" class="normal">8</text><rect x="50" y="320" width="390" height="105" rx="14" class="gray"/><rect x="610" y="325" width="320" height="90" rx="14" class="gray"/><text x="80" y="355" class="normal muted">• 查询点：x=8，y=5。</text><text x="80" y="387" class="normal muted">• depth[8]=4，depth[5]=3。</text><text x="640" y="375" class="normal">pa[x][k] = 第 2^k 个祖先</text></svg>