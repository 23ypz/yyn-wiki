<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460"><style>
text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #243447; }
.small { font-size: 16px; }
.normal { font-size: 20px; }
.big { font-size: 26px; font-weight: 700; }
